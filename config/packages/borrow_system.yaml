input_select:
  borrow_item:
    name: "เลือกอุปกรณ์"
    options:
      - "Dell Laptop"
      - "iPad Pro"
      - "Sony Camera"
    icon: mdi:devices

input_text:
  borrower_name:
    name: "ชื่อผู้ยืม"
    initial: ""
  borrow_note:
    name: "บันทึกเพิ่มเติม"

input_datetime:
  borrow_due_date:
    name: "กำหนดคืน"
    has_date: true
    has_time: false

script:
  log_borrow_action:
    alias: "บันทึกการยืม"
    sequence:
      - service: notify.persistent_notification
        data:
          title: "Borrow System Update"
          message: "{{ states('input_text.borrower_name') }} ได้ยืม {{ states('input_select.borrow_item') }} กำหนดคืน {{ states('input_datetime.borrow_due_date') }}"